name: mosaicod Release Candidate Container

on:
  push:
    branches:
      - 'release/v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  check-version:
    name: Check RC Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.cargo_version.outputs.version }}
      is_rc: ${{ steps.rc_check.outputs.is_rc }}
      short_sha: ${{ steps.sha.outputs.short_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: cargo_version
        run: |
          VERSION=$(grep -m1 '^version' mosaicod/Cargo.toml | sed 's/version = "\(.*\)"/\1/' | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Check if version is a release candidate
        id: rc_check
        run: |
          VERSION="${{ steps.cargo_version.outputs.version }}"
          if [[ "${VERSION}" == *"-rc"* ]]; then
            echo "is_rc=true" >> "$GITHUB_OUTPUT"
            echo "Version '${VERSION}' is a release candidate — proceeding."
          else
            echo "is_rc=false" >> "$GITHUB_OUTPUT"
            echo "Version '${VERSION}' is not a release candidate — skipping."
          fi

      - name: Get short commit SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.platform }})
    needs: check-version
    if: needs.check-version.outputs.is_rc == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            platform_slug: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            platform_slug: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: mosaicod
          file: docker/dockerfiles/Dockerfile.mosaicod
          platforms: ${{ matrix.platform }}
          build-args: |
            GIT_HASH=${{ github.sha }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/mosaicod,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge multi-arch manifest
    needs: [check-version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          SHORT_SHA: ${{ needs.check-version.outputs.short_sha }}
          OWNER: ${{ github.repository_owner }}
        run: |
          IMAGE="ghcr.io/${OWNER}/mosaicod"
          DIGESTS=$(printf "${IMAGE}@sha256:%s " $(ls /tmp/digests))

          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:${VERSION}-${SHORT_SHA}" \
            ${DIGESTS}

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/mosaicod:${{ needs.check-version.outputs.version }}

      - name: Job summary
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/mosaicod"
          VERSION="${{ needs.check-version.outputs.version }}"
          SHORT_SHA="${{ needs.check-version.outputs.short_sha }}"
          echo "### RC Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${IMAGE}:${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version + SHA | \`${IMAGE}:${VERSION}-${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Platforms | \`linux/amd64\`, \`linux/arm64\` |" >> $GITHUB_STEP_SUMMARY